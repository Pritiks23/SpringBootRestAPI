<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geospatial Analysis Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 25px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            font-size: 1.4em;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .region-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-size: 1.1em;
            font-weight: 500;
        }

        .description {
            color: #555;
            font-size: 0.95em;
            margin: 15px 0;
            padding: 10px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
        }

        .signals-container {
            margin-top: 20px;
        }

        .signals-title {
            color: #333;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .signal-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .signal-label {
            color: #333;
            font-weight: 500;
        }

        .signal-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .signal-score.high {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .signal-score.medium {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .signal-score.low {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .filter-section h3 {
            color: #333;
            margin-bottom: 15px;
        }

        input[type="text"],
        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            margin-right: 10px;
        }

        .map-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .coordinates {
            color: #666;
            font-size: 0.9em;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🗺️ Geospatial Analysis Dashboard</h1>
            <p class="subtitle">Real-time Regional Data & Signal Metrics</p>
            <div class="controls">
                <button class="btn-primary" onclick="loadData()">Refresh Data</button>
                <button class="btn-secondary" onclick="toggleView()">Toggle View</button>
            </div>
        </header>

        <div class="stats-grid" id="statsContainer"></div>

        <div class="filter-section">
            <h3>Search & Filter</h3>
            <input type="text" id="searchInput" placeholder="Search regions..." onkeyup="filterRegions()">
            <select id="sortSelect" onchange="sortData()">
                <option value="name">Sort by Name</option>
                <option value="avgScore">Sort by Average Score</option>
            </select>
        </div>

        <div id="dashboardContainer" class="dashboard-grid"></div>
        <div id="loadingContainer" class="loading">Loading data...</div>
    </div>

    <script>
        let allRegions = [];
        let allSignals = [];

        async function loadData() {
            try {
                document.getElementById('loadingContainer').style.display = 'block';
                document.getElementById('dashboardContainer').innerHTML = '';

                const [regionsRes, signalsRes] = await Promise.all([
                    fetch('/api/regions'),
                    fetch('/api/signals')
                ]);

                if (!regionsRes.ok || !signalsRes.ok) {
                    throw new Error('Failed to fetch data');
                }

                const regionsData = await regionsRes.json();
                const signalsData = await signalsRes.json();

                allRegions = regionsData.data || [];
                allSignals = signalsData.data || [];

                document.getElementById('loadingContainer').style.display = 'none';
                renderDashboard();
                updateStats();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loadingContainer').innerHTML = 
                    `<div class="error">Error loading data. Please try again.</div>`;
            }
        }

        function updateStats() {
            const totalRegions = allRegions.length;
            const totalSignals = allSignals.length;
            const avgScore = allSignals.length > 0 
                ? (allSignals.reduce((sum, s) => sum + s.score, 0) / allSignals.length).toFixed(1)
                : 0;
            const maxScore = allSignals.length > 0 
                ? Math.max(...allSignals.map(s => s.score)).toFixed(1)
                : 0;

            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-box">
                    <div class="stat-number">${totalRegions}</div>
                    <div class="stat-label">Total Regions</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">${totalSignals}</div>
                    <div class="stat-label">Total Signals</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">${avgScore}</div>
                    <div class="stat-label">Average Score</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">${maxScore}</div>
                    <div class="stat-label">Highest Score</div>
                </div>
            `;
        }

        function renderDashboard() {
            const container = document.getElementById('dashboardContainer');
            container.innerHTML = '';

            allRegions.forEach(region => {
                const regionSignals = allSignals.filter(s => s.region && s.region.id === region.id);
                const avgScore = regionSignals.length > 0
                    ? (regionSignals.reduce((sum, s) => sum + s.score, 0) / regionSignals.length).toFixed(1)
                    : 'N/A';

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h2>${region.name}</h2>
                    <div class="region-info">
                        <div class="info-item">
                            <span class="info-label">Latitude</span>
                            <span class="info-value">${region.latitude.toFixed(4)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Longitude</span>
                            <span class="info-value">${region.longitude.toFixed(4)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Avg Signal Score</span>
                            <span class="info-value">${avgScore}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Signal Count</span>
                            <span class="info-value">${regionSignals.length}</span>
                        </div>
                    </div>
                    <div class="description">${region.description}</div>
                    <div class="coordinates">📍 ${region.latitude.toFixed(4)}, ${region.longitude.toFixed(4)}</div>
                    <div class="signals-container">
                        <div class="signals-title">Signal Indicators (${regionSignals.length})</div>
                        ${regionSignals.length > 0 ? regionSignals.map(signal => `
                            <div class="signal-item">
                                <span class="signal-label">${signal.indicatorType}</span>
                                <span class="signal-score ${getScoreClass(signal.score)}">${signal.score.toFixed(1)}</span>
                            </div>
                        `).join('') : '<p style="color: #999;">No signals available</p>'}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function getScoreClass(score) {
            if (score >= 80) return 'high';
            if (score >= 50) return 'medium';
            return 'low';
        }

        function filterRegions() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            allRegions = allRegions.filter(r => r.name.toLowerCase().includes(searchTerm) || r.description.toLowerCase().includes(searchTerm));
            renderDashboard();
        }

        function sortData() {
            const sortBy = document.getElementById('sortSelect').value;
            if (sortBy === 'name') {
                allRegions.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === 'avgScore') {
                allRegions.sort((a, b) => {
                    const avgA = allSignals.filter(s => s.region && s.region.id === a.id)
                        .reduce((sum, s) => sum + s.score, 0) / allSignals.filter(s => s.region && s.region.id === a.id).length || 0;
                    const avgB = allSignals.filter(s => s.region && s.region.id === b.id)
                        .reduce((sum, s) => sum + s.score, 0) / allSignals.filter(s => s.region && s.region.id === b.id).length || 0;
                    return avgB - avgA;
                });
            }
            renderDashboard();
        }

        function toggleView() {
            alert('View toggle feature coming soon!');
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html>
